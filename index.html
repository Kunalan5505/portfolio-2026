<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>KUNALAN MAHENDRAN | Portfolio</title>

<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="particleCanvas"></canvas>

<header class="header glass">
  <h2>KUNALAN</h2>
</header>

<section class="hero">
  <div class="hero-left">
    <h1>Driving 25%+ growth in leads through data-driven marketing</h1>
    <p>Senior Digital Marketing Executive specializing in performance campaigns, analytics, and automation.</p>
  </div>

  <div class="hero-right">
    <div class="hero-3d tilt-card">
      <iframe src="https://my.spline.design/placeholder" frameborder="0"></iframe>
    </div>

    <div class="profile-card tilt-card">
      <img src="images/profile.jpg" />
      <h3>KUNALAN MAHENDRAN</h3>
      <p>Selangor, Malaysia</p>
    </div>
  </div>
</section>

<section class="projects">
  <h2>Projects</h2>

  <div class="slider-container">
    <button id="prevBtn">‹</button>

    <div class="slider" id="projectSlider">

      <div class="slide active">
        <img src="images/project-1.jpg">
        <h3>Landing Pages</h3>
        <button class="open-modal" data-project="project1">View</button>
      </div>

      <div class="slide">
        <img src="images/project-2-1.jpg">
        <h3>Campaigns</h3>
        <button class="open-modal" data-project="project2">View</button>
      </div>

      <div class="slide">
        <img src="images/project-3.jpg">
        <h3>AI Chatbot</h3>
        <button class="open-modal" data-project="project3">View</button>
      </div>

    </div>

    <button id="nextBtn">›</button>
  </div>
</section>

<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
